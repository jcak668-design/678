baseURL = "https://jcak668-design.github.io/678/"
languageCode = "zh-CN"
title = "678导航站"
theme = "hugo-webstack"

#true:允许大写字母url路径，false:将url路径转换成小写
disablePathToLower = true

#页脚：作者名字
copyright = "afx"

#网站信息，不显示，仅供搜索引擎参考
[params]
  keywords = "网址导航,webstack,hugo,vpn,科学上网，免费节点，爱分享，科技共享"
  description = "Webstack Hugo版主题,网址导航"

#是否开启搜索栏，true开启，false关闭
[params.search]
  enable = true

#设置默认模式，true暗色模式，false亮色模式
[params.darkmode]
  enable = false

#主页菜单栏显示在线编辑按钮
[params.edit]
  enable = true
  url = "https://github.com/jcak668-design/678/blob/main/data/webstack.yml"
  
#桌面端右上角code按钮
[params.github]
  enable = true 
  url = "https://github.com/jcak668-design/678"
  
[permalinks]  
  404 = "/404.html"

#是否对本地搜索功能开启拼音匹配
[params.pinyin]
  enable = true
